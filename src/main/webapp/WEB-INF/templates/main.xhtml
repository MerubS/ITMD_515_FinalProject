<!DOCTYPE html>
<!--
  HR Directory
  Author: MerubS
  main.xhtml - Facelets layout template
-->
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets">
<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>HR Directory — <ui:insert name="pageTitle">Page</ui:insert></title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; color: #333; }

        /* ── Nav ── */
        nav {
            background: #2c3e50;
            padding: 0 32px;
            display: flex;
            align-items: center;
            height: 56px;
            gap: 24px;
        }
        nav .brand { color: #fff; font-size: 18px; font-weight: 700; margin-right: auto; }
        nav a { color: #bdc3c7; text-decoration: none; font-size: 14px; padding: 4px 0; }
        nav a:hover { color: #fff; }

        /* ── Content ── */
        .container { max-width: 1100px; margin: 32px auto; padding: 0 24px; }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 20px; color: #2c3e50; }

        /* ── Table ── */
        table { width: 100%; border-collapse: collapse; background: #fff;
            border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
        th { background: #2c3e50; color: #fff; padding: 12px 16px; text-align: left; font-size: 13px; }
        td { padding: 11px 16px; border-bottom: 1px solid #eee; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f9f9f9; }

        /* ── Buttons ── */
        .btn {
            display: inline-block; padding: 8px 18px; border-radius: 6px;
            font-size: 13px; font-weight: 500; cursor: pointer;
            border: none; text-decoration: none;
        }
        .btn-primary  { background: #2980b9; color: #fff; }
        .btn-primary:hover  { background: #1f6391; }
        .btn-success  { background: #27ae60; color: #fff; }
        .btn-success:hover  { background: #1e8449; }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-secondary:hover { background: #7f8c8d; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        /* ── Form ── */
        .form-card {
            background: #fff; border-radius: 8px; padding: 28px 32px;
            box-shadow: 0 1px 4px rgba(0,0,0,.1); max-width: 540px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600;
            margin-bottom: 6px; color: #555; }
        .form-group input, .form-group select {
            width: 100%; padding: 9px 12px; border: 1px solid #ccc;
            border-radius: 6px; font-size: 14px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: #2980b9;
        }

        /* ── Filter bar ── */
        .filter-bar {
            background: #fff; border-radius: 8px; padding: 16px 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 20px;
            display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap;
        }
        .filter-bar label { font-size: 12px; font-weight: 600; color: #555;
            display: block; margin-bottom: 4px; }
        .filter-bar input, .filter-bar select {
            padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px;
        }

        /* ── Messages ── */
        .msg-info  { background: #d4edda; color: #155724; border: 1px solid #c3e6cb;
            border-radius: 6px; padding: 12px 16px; margin-bottom: 16px; }
        .msg-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;
            border-radius: 6px; padding: 12px 16px; margin-bottom: 16px; }

        /* ── Dept cards ── */
        .dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 16px; }
        .dept-card {
            background: #fff; border-radius: 8px; padding: 20px 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,.1);
            display: flex; flex-direction: column; gap: 10px;
        }
        .dept-card h3 { font-size: 16px; color: #2c3e50; }
        .dept-card span { font-size: 12px; color: #888; }
    </style>
</h:head>
<h:body>
    <!-- Navigation -->
    <nav>
        <span class="brand">🏢 HR Directory</span>
        <a href="#{request.contextPath}/departments.xhtml">Departments</a>
        <a href="#{request.contextPath}/employees.xhtml">Employees</a>
    </nav>

    <!-- Page content inserted here -->
    <div class="container">
        <ui:insert name="content"/>
    </div>
</h:body>
</html>
